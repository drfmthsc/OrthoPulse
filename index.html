<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Join · OrthoPulse</title>
<link rel="stylesheet" href="/css/app.css" />
<script src="/socket.io/socket.io.js"></script>
<style>
  .shell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px}
  .shell.bright{background:var(--bone);color:#152029}
  .card{width:100%;max-width:440px}
  .card h2{font-family:var(--f-display);font-weight:700;font-size:28px;margin:0 0 6px;text-align:center}
  .card p.lead{text-align:center;color:var(--bone-dim);margin:0 0 22px}
  .code-input{font-family:var(--f-mono);font-weight:700;font-size:32px;letter-spacing:.3em;text-align:center;text-transform:uppercase;width:100%;background:var(--xray-panel);border:1.5px solid var(--line-strong);border-radius:12px;color:var(--bone);padding:16px 10px;margin-bottom:12px}
  .name-input{font-family:var(--f-body);font-size:17px;width:100%;background:var(--xray-panel);border:1.5px solid var(--line-strong);border-radius:12px;color:var(--bone);padding:14px 16px;margin-bottom:14px;text-align:center}
  .send{background:var(--teal);color:#04201d;font-family:var(--f-display);font-weight:600;font-size:17px;border-radius:12px;padding:15px;width:100%;transition:.18s}
  .send:hover{background:#16a898}.send:disabled{opacity:.4;cursor:not-allowed}

  .pq{font-family:var(--f-display);font-weight:600;font-size:clamp(21px,5vw,28px);line-height:1.15;margin:6px 0 18px;color:#152029}
  .qimg{width:100%;border-radius:12px;margin:0 0 16px;border:1px solid #d9d0bf}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{text-align:left;background:#fff;border:1.5px solid #d9d0bf;border-radius:12px;padding:16px 18px;font-size:17px;font-weight:500;color:#1c2830;display:flex;align-items:center;gap:14px;transition:.15s;width:100%}
  .opt:hover{border-color:var(--teal)}
  .opt .k{font-family:var(--f-mono);font-size:13px;font-weight:700;color:var(--teal-deep);border:1.5px solid #d9d0bf;border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex:none}
  .opt.sel{background:#052e2a;border-color:#052e2a;color:var(--bone)}.opt.sel .k{border-color:rgba(240,233,219,.4);color:var(--teal)}
  .opt.correct{background:#e4f6ec;border-color:var(--good)}.opt.incorrect{background:#f7e4e2;border-color:var(--bad)}
  .opt.disabled{opacity:.55;pointer-events:none}
  .rmark{margin-left:auto;font-family:var(--f-mono);font-weight:700;font-size:13px}
  .status{font-family:var(--f-mono);font-size:12px;color:#5a6670;text-align:center;margin-top:16px}
  .thanks{text-align:center;padding:24px 0;color:#3a464e}
  .thanks .big{font-family:var(--f-display);font-weight:700;font-size:40px;color:var(--teal-deep);margin-bottom:6px}
  .pill-dark{display:inline-block;font-family:var(--f-mono);font-size:11px;letter-spacing:.1em;color:#5a6670;border:1px solid #d9d0bf;border-radius:100px;padding:5px 12px;margin-top:16px}
  .explain{font-family:var(--f-mono);font-size:12px;color:#3a464e;background:#eae2d2;border:1px solid #d9d0bf;border-radius:10px;padding:12px 14px;margin-top:14px;line-height:1.6}
  .lb{background:#fff;border:1px solid #d9d0bf;border-radius:12px;overflow:hidden;margin-top:6px}
  .lb .row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #eee3d0}
  .lb .row:last-child{border-bottom:none}.lb .rk{font-family:var(--f-mono);font-weight:700;color:var(--teal-deep);width:22px}
  .lb .nm{flex:1;font-weight:600;color:#1c2830}.lb .sc{font-family:var(--f-mono);color:#3a464e}
  .lb .me{background:#eafaf5}
  .waitspin{width:34px;height:34px;border:3px solid #d9d0bf;border-top-color:var(--teal);border-radius:50%;margin:20px auto;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar"><a class="logo" href="/"><span class="glyph"><svg width="24" height="24" viewBox="0 0 26 26" fill="none"><path d="M7 4c-1.7 0-3 1.3-3 3 0 1.3.8 2.4 2 2.8v6.4c-1.2.4-2 1.5-2 2.8 0 1.7 1.3 3 3 3s3-1.3 3-3c0-1.3-.8-2.4-2-2.8V9.8c1.2-.4 2-1.5 2-2.8 0-1.7-1.3-3-3-3zM19 4c-1.7 0-3 1.3-3 3 0 1.3.8 2.4 2 2.8v6.4c-1.2.4-2 1.5-2 2.8 0 1.7 1.3 3 3 3s3-1.3 3-3c0-1.3-.8-2.4-2-2.8V9.8c1.2-.4 2-1.5 2-2.8 0-1.7-1.3-3-3-3z" stroke="#1ab5a4" stroke-width="1.4"/></svg></span>Ortho<b>Pulse</b></a><div class="spacer"></div><span class="pill" id="codepill" style="display:none"></span></div>
  <div class="shell" id="shell"><div class="card" id="card"></div></div>
</div>
<script src="/js/join.js"></script>
</body>
</html>
