<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in · OrthoPulse</title>
<link rel="stylesheet" href="/app.css" />
</head>
<body>
<div class="marker l">L<small>ORTHO</small></div>
<div class="marker r">R<small>PULSE</small></div>
<div class="page">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px">
    <div style="width:100%;max-width:360px;text-align:center">
      <div class="eyebrow">Presenter &amp; author access</div>
      <h1 style="font-family:var(--f-display);font-weight:700;font-size:34px;margin:0 0 8px">Sign in</h1>
      <p class="sub">Participants don't need this — only the person running or building the session.</p>
      <input id="pw" type="password" placeholder="Password" style="font-family:var(--f-body);font-size:18px;width:100%;background:var(--xray-panel);border:1.5px solid var(--line-strong);border-radius:12px;color:var(--bone);padding:15px 16px;text-align:center;margin-bottom:14px" />
      <button class="btn primary" style="width:100%;justify-content:center" onclick="login()">Enter</button>
      <div id="msg" class="err" style="margin-top:14px;min-height:18px"></div>
    </div>
  </div>
</div>
<script>
const next = new URLSearchParams(location.search).get('next') || '/admin';
async function login(){
  const msg = document.getElementById('msg'); msg.textContent='';
  const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})});
  if(r.ok){ location.href = next; } else { msg.textContent='Wrong password.'; }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
